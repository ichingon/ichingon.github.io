name: Desplegar Hugo en GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Configurar Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Instalar Hugo Extended
        uses: peaceiris/actions-hugo@v3  # 👈 ¡Corregido aquí!
        with:
          hugo-version: '0.161.1'
          extended: true

      - name: Compilar con Hugo
        run: |
          hugo --gc --minify

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar en internet
        id: deployment
        uses: actions/deploy-pages@v4