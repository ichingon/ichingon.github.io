baseURL = "https://ichingon.github.io/"
theme = "blowfish"

# 1. Configuración del Núcleo y Modos
defaultContentLanguage = "es"
defaultContentLanguageInSubdir = true

[params]
  defaultAppearance = "dark" 
  allowAppearanceChange = true 
  logo = "logo.png" # 👈 ¡AQUÍ ES DONDE VA! Raíz de params.

# 2. Personalización Visual del Menú
[params.header]
  layout = "basic"
  # (Borramos la línea del logo de aquí adentro)

[params.footer]
  showCopyright = true
  showThemeAttribution = false

# 3. La Estrategia de Idiomas
[languages]
  [languages.es]
    languageName = "Español"
    contentDir = "content"
    weight = 1
    title = "El I Chingón"
    [languages.es.params]
      description = "Filosofía, Ciencia de Sistemas y Tecnología"

  [languages.en]
    languageName = "English"
    contentDir = "content"
    weight = 2
    title = "I Chingon"
    [languages.en.params]
      description = "Philosophy, Systems Science, and Technology"