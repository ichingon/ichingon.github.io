baseURL = "https://elichingon.com/"
theme = "blowfish"

# 1. Configuración del Núcleo y Modos
defaultContentLanguage = "es"
defaultContentLanguageInSubdir = false

[params]
  defaultAppearance = "dark" 
  allowAppearanceChange = true 
  logo = "logo.png" # 👈 ¡AQUÍ ES DONDE VA! Raíz de params.

# 2. Personalización Visual del Menú
[params.header]
  layout = "basic"
  # (Borramos la línea del logo de aquí adentro)

[params.footer]
  showCopyright = true
  showThemeAttribution = false

# 3. La Estrategia de Idiomas e Internacionalización con Menús
[languages]
  [languages.es]
    languageName = "Español"
    weight = 1
    title = "El I Chingón"
    [languages.es.params]
      description = "El I Ching visto como un protocolo de información descentralizado. Una intersección de la filosofía, el sincronismo, las matemáticas y las ciencias de la computación."
    
    # Menú en Español
    [[languages.es.menu.main]]
      name = "Hexagramas"
      pageRef = "hexagramas"
      weight = 1
    [[languages.es.menu.main]]
      name = "Filosofía"
      pageRef = "filosofia"
      weight = 2
    [[languages.es.menu.main]]
      name = "YouTube"
      url = "https://www.youtube.com/@ElIChingon"
      weight = 3

  [languages.en]
    languageName = "English"
    weight = 2
    title = "I Chingon"
    [languages.en.params]
      description = "The I Ching as a decentralized information protocol. An intersection of philosophy, synchronicity, mathematics, and computer science."
    
    # Menú en Inglés
    [[languages.en.menu.main]]
      name = "Hexagrams"
      pageRef = "hexagrams"
      weight = 1
    [[languages.en.menu.main]]
      name = "Philosophy"
      pageRef = "philosophy"
      weight = 2
    [[languages.en.menu.main]]
      name = "YouTube"
      url = "https://www.youtube.com/@ElIChingon"
      weight = 3