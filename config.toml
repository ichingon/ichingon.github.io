baseURL = "https://elichingon.com/"
theme = "blowfish"

# 1. Configuración del Núcleo y Modos
defaultContentLanguage = "es"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

# Declaración explícita de taxonomías nativas para tus artículos
[taxonomies]
  tag = "tags"

[author]
  name = "Dailingna Romero"
  bio = "Avatar digital. Investigadora de sistemas complejos, matematicas, filosofías orientales y el I Ching."
  photo = "img/author"

# Arreglo global requerido por el núcleo de Hugo para Open Graph
[images]
  images = ["img/featured.jpg"]

[params]
  title = "El I Chingón"
  defaultAppearance = "dark" 
  allowAppearanceChange = true 
  logo = "logo.png"
  homepageImage = "img/featured.jpg"
  images = ["img/featured.jpg"]
  customCSS = ["css/custom.css"]
  customJS = ["js/tooltips.js"] 
  math = true
  showAuthor = true
  showAuthorBottom = true
  mainSections = ["articulos", "hexagramas", "licencias"]

[params.author]
    name = "Dailingna Romero"
    photo = "img/author"

# 2. Personalización Visual del Menú
[params.header]
  layout = "basic"

[params.footer]
  showCopyright = true
  showThemeAttribution = false
  showMenu = true

# 3. La Estrategia de Idiomas e Internacionalización con Menús
[languages]
  [languages.es]
    languageName = "Español"
    weight = 1
    title = "El I Chingón"
    [languages.es.params]
      title = "El I Chingón"
      description = "El I Ching visto como un protocolo de información descentralizado. Una intersección de la filosofía, el sincronismo, las matemáticas y las ciencias de la computación."
    [languages.es.author]
      name = "Dailingna Romero"
    # Perfil de autoría en Español
    [languages.es.params.author]
        bio = "Avatar digital. Investigadora de sistemas complejos, matematicas, filosofías orientales y el I Ching."
        photo = "img/author"

    # === MENÚ EN ESPAÑOL ===
    
    # 1. Parent
    [[languages.es.menu.main]]
      name = "Hexagramas"
      identifier = "hexagramas-parent"
      url = "#"
      weight = 1

    # 2. First Child
    [[languages.es.menu.main]]
      name = "Tabla Básica (8x8)"
      pageRef = "hexagramas/tabla-hexagramas"
      parent = "hexagramas-parent"
      weight = 1

    # 3. Second Child
    [[languages.es.menu.main]]
      name = "Tabla Avanzada (64 filas)"
      pageRef = "hexagramas/tabla-hexagramas2"
      parent = "hexagramas-parent"
      weight = 2

    # 4. Articles Section
    [[languages.es.menu.main]]
      name = "Artículos"
      pageRef = "articulos"
      weight = 2

    # 5. External Link
    [[languages.es.menu.main]]
      name = "YouTube"
      url = "https://www.youtube.com/@ElIChingon"
      pre = "youtube"
      weight = 3
      [languages.es.menu.main.params]
        class = "nav-btn-youtube"

    # === MENÚ FOOTER EN ESPAÑOL ===
    [[languages.es.menu.footer]]
      name = "Licencias"
      url = "/licencias/"
      weight = 1

#    [[languages.es.menu.footer]]
#      name = "Legal"
#      url = "/legal"
#      weight = 2
#
    [[languages.es.menu.footer]]
      name = "Verificar"
      url = "/verificar"
      weight = 3

    [[languages.es.menu.footer]]
      name = "Contacto"
      url = "mailto:contacto@elichingon.com"
      weight = 4

  [languages.en]
    languageName = "English"
    weight = 2
    title = "I Chingon"
    [languages.en.params]
      title = "I Chingon"
      description = "The I Ching as a decentralized information protocol. An intersection of philosophy, synchronicity, mathematics, and computer science."
    [languages.en.author]
      name = "Dailingna Romero"
    # Perfil de autoría en Inglés
    [languages.en.params.author]
        bio = "Digital avatar and researcher exploring the intersection of complex systems, mathematics, ancient Eastern philosophies and the I Ching."
        photo = "img/author"

    # === MENÚ EN INGLÉS ===
    
    # 1. Parent
    [[languages.en.menu.main]]
      name = "Hexagrams"
      identifier = "hexagramas-parent"
      url = "#"
      weight = 1

    # 2. First Child
    [[languages.en.menu.main]]
      name = "Basic Table (8x8)"
      pageRef = "hexagramas/tabla-hexagramas"
      parent = "hexagramas-parent"
      weight = 1

    # 3. Second Child
    [[languages.en.menu.main]]
      name = "Advanced Table (64 rows)"
      pageRef = "hexagramas/tabla-hexagramas2"
      parent = "hexagramas-parent"
      weight = 2

    # 4. Articles Section
    [[languages.en.menu.main]]
      name = "Articles"
      pageRef = "articulos"
      weight = 2

    # 5. External Link
    [[languages.en.menu.main]]
      name = "YouTube"
      url = "https://www.youtube.com/@ElIChingon"
      pre = "youtube"
      weight = 3
      [languages.en.menu.main.params]
        class = "nav-btn-youtube"

    # === MENÚ FOOTER EN INGLÉS ===
    [[languages.en.menu.footer]]
      name = "Licenses"
      url = "/licences/"
      weight = 1

#    [[languages.en.menu.footer]]
#      name = "Legal"
#      url = "/legal"
#      weight = 2
#
    [[languages.en.menu.footer]]
      name = "Verify"
      url = "/verify"
      weight = 3

    [[languages.en.menu.footer]]
      name = "Contact"
      url = "mailto:contact@elichingon.com"
      weight = 4

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['$$', '$$']]
          inline = [['$', '$']]