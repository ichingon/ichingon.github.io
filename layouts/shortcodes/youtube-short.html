<div class="yt-short-fixed" style="width: 100%; max-width: 315px; margin: 25px auto; display: block;">
  <iframe 
    src="https://www.youtube.com/shorts/{{ .Get 0 }}" 
    title="{{ .Get 1 | default "YouTube Short" }}"
    style="width: 100%; height: 560px; border: 0; border-radius: 12px; display: block;"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
    allowfullscreen>
  </iframe>
</div>
