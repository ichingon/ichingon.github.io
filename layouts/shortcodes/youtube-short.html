<div class="youtube-short-wrapper" style="max-width: 280px; margin: 30px auto; width: 100%;">
  <div class="youtube-short-container" style="position: relative; width: 100%; height: 0; padding-bottom: 177.77%; overflow: hidden; border-radius: 16px; background-color: transparent;">
    <iframe 
      src="https://www.youtube.com/embed/{{ .Get 0 }}" 
      title="{{ .Get 1 | default "YouTube Shorts" }}"
      style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
      allowfullscreen>
     iframe>
  </div>
</div>
